<!doctype html>
<html class="desktop">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      :root {
        --loading-titlebar-height: 38px;
        --loading-app-bg: #f5f6f8;
        --loading-nav-bg: #eef1f5;
        --loading-nav-border: rgba(15, 23, 42, 0.06);
        --loading-panel-bg: #fbfbfc;
        --loading-panel-border: rgba(15, 23, 42, 0.08);
        --loading-block-strong: rgba(71, 85, 105, 0.18);
        --loading-block: rgba(71, 85, 105, 0.11);
        --loading-block-soft: rgba(71, 85, 105, 0.07);
        --loading-brand: rgba(15, 23, 42, 0.78);
      }

      html[data-theme='dark'] {
        --loading-app-bg: #090d15;
        --loading-nav-bg: #0d1420;
        --loading-nav-border: rgba(148, 163, 184, 0.12);
        --loading-panel-bg: linear-gradient(180deg, #111827 0%, #0b1220 100%);
        --loading-panel-border: rgba(148, 163, 184, 0.12);
        --loading-block-strong: rgba(148, 163, 184, 0.22);
        --loading-block: rgba(148, 163, 184, 0.14);
        --loading-block-soft: rgba(148, 163, 184, 0.08);
        --loading-brand: rgba(241, 245, 249, 0.88);
      }

      body {
        overflow: hidden;
        background: var(--loading-app-bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        overflow: hidden;
        background: var(--loading-app-bg);
        color: var(--loading-brand);
        user-select: none;
      }

      #loading-titlebar {
        box-sizing: border-box;
        height: var(--loading-titlebar-height);
        padding: 0 16px;
        border-bottom: 1px solid var(--loading-nav-border);
        background: color-mix(in srgb, var(--loading-app-bg) 90%, transparent);
      }

      #loading-window-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        height: 100%;
        gap: 8px;
      }

      .loading-window-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--loading-block);
      }

      #loading-shell {
        display: flex;
        height: calc(100% - var(--loading-titlebar-height));
        width: 100%;
      }

      #loading-sidebar {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        width: 272px;
        min-width: 272px;
        padding: 14px 14px 12px;
        border-inline-end: 1px solid var(--loading-nav-border);
        background: var(--loading-nav-bg);
        gap: 14px;
      }

      #loading-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 28px;
        opacity: 0.92;
      }

      #loading-brand-mark {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        background: linear-gradient(
          135deg,
          color-mix(in srgb, var(--loading-brand) 84%, transparent),
          color-mix(in srgb, var(--loading-block-strong) 100%, transparent)
        );
      }

      #loading-brand-label {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .loading-sidebar-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .loading-sidebar-spacer {
        flex: 1;
      }

      .loading-nav-item,
      .loading-account-block,
      .loading-panel-block,
      .loading-title-line,
      .loading-input-shell,
      .loading-hero-card {
        position: relative;
        overflow: hidden;
        background: var(--loading-block);
      }

      .loading-nav-item::after,
      .loading-account-block::after,
      .loading-panel-block::after,
      .loading-title-line::after,
      .loading-input-shell::after,
      .loading-hero-card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          color-mix(in srgb, white 48%, transparent) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        animation: loading-sheen 1.8s ease-in-out infinite;
        opacity: 0.28;
      }

      @keyframes loading-sheen {
        100% {
          transform: translateX(100%);
        }
      }

      .loading-nav-item {
        height: 34px;
        border-radius: 12px;
      }

      .loading-account-block {
        height: 44px;
        border-radius: 14px;
        background: var(--loading-block-soft);
      }

      #loading-main {
        box-sizing: border-box;
        flex: 1;
        min-width: 0;
        padding: 8px 8px 8px 0;
      }

      #loading-main-panel {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 18px 20px 20px;
        border: 1px solid var(--loading-panel-border);
        border-radius: 12px;
        background: var(--loading-panel-bg);
        gap: 18px;
      }

      #loading-main-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .loading-title-line {
        height: 12px;
        border-radius: 999px;
      }

      #loading-main-title {
        width: 152px;
        background: var(--loading-block-strong);
      }

      #loading-main-actions {
        width: 108px;
      }

      .loading-input-shell {
        height: 66px;
        border-radius: 20px;
        background: var(--loading-block-soft);
      }

      #loading-hero-row,
      #loading-lower-row {
        display: grid;
        gap: 12px;
      }

      #loading-hero-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      #loading-lower-row {
        grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      }

      .loading-hero-card {
        height: 98px;
        border-radius: 18px;
        background: var(--loading-block-soft);
      }

      .loading-panel-block {
        border-radius: 18px;
        background: var(--loading-block-soft);
      }

      #loading-lower-primary {
        min-height: 122px;
      }

      #loading-lower-secondary {
        min-height: 122px;
      }

      @media (max-width: 1180px) {
        #loading-sidebar {
          width: 248px;
          min-width: 248px;
        }

        #loading-hero-row,
        #loading-lower-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        #loading-lower-secondary {
          display: none;
        }
      }
    </style>
  </head>
  <body style="height: 100%">
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        var locale = navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div id="loading-titlebar" aria-hidden="true">
        <div id="loading-window-actions">
          <span class="loading-window-dot"></span>
          <span class="loading-window-dot"></span>
          <span class="loading-window-dot"></span>
        </div>
      </div>
      <div id="loading-shell" aria-label="Loading" role="status">
        <aside id="loading-sidebar">
          <div id="loading-brand">
            <span id="loading-brand-mark"></span>
            <span id="loading-brand-label">LobeHub</span>
          </div>

          <div class="loading-sidebar-group">
            <div class="loading-nav-item"></div>
            <div class="loading-nav-item"></div>
            <div class="loading-nav-item"></div>
            <div class="loading-nav-item"></div>
            <div class="loading-nav-item"></div>
          </div>

          <div class="loading-sidebar-spacer"></div>
          <div class="loading-account-block"></div>
        </aside>

        <main id="loading-main">
          <div id="loading-main-panel">
            <div id="loading-main-header">
              <div class="loading-title-line" id="loading-main-title"></div>
              <div class="loading-title-line" id="loading-main-actions"></div>
            </div>

            <div class="loading-input-shell"></div>

            <div id="loading-hero-row">
              <div class="loading-hero-card"></div>
              <div class="loading-hero-card"></div>
              <div class="loading-hero-card"></div>
            </div>

            <div id="loading-lower-row">
              <div class="loading-panel-block" id="loading-lower-primary"></div>
              <div class="loading-panel-block" id="loading-lower-secondary"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div id="root" style="height: 100%"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="../../src/spa/entry.desktop.tsx"></script>
  </body>
</html>
